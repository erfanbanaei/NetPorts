name: "➕ Add New Protocol"
description: "Suggest adding a new network protocol or port"
title: "[New Protocol] "
labels: ["new-protocol", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Add a New Protocol
        Thanks for contributing! Please fill out the details below so we can add the protocol to the list.

  - type: input
    id: port
    attributes:
      label: Port Number
      description: The port number used by this protocol
      placeholder: "e.g. 5432"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Protocol Name
      description: The common name of the protocol
      placeholder: "e.g. PostgreSQL"
    validations:
      required: true

  - type: input
    id: abbreviation
    attributes:
      label: Abbreviation
      description: The abbreviation or short name
      placeholder: "e.g. PostgreSQL"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport Protocol
      description: Which transport layer protocol does it use?
      options:
        - TCP
        - UDP
        - TCP/UDP
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Select the most relevant category
      options:
        - File Transfer
        - Web
        - Email
        - Security
        - Remote Access
        - Network Services
        - Network Management
        - Directory
        - Database
        - Message Queue
        - Media & Communication
        - Sharing
        - Proxy
        - Container & DevOps
        - Monitoring
        - Gaming & Multimedia
        - Web Server & API
        - Printing
        - Storage
        - CI/CD & Dev Tools
        - Team Communication
        - Virtualization
        - Other (specify in notes)
    validations:
      required: true

  - type: input
    id: description_en
    attributes:
      label: Description (English)
      description: A brief description in English
      placeholder: "e.g. Powerful open-source relational database"
    validations:
      required: true

  - type: input
    id: description_fa
    attributes:
      label: Description (Farsi) — Optional
      description: A brief description in Farsi (we can translate if left empty)
      placeholder: "e.g. پایگاه داده رابطه‌ای قدرتمند متن‌باز"

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any references, RFC numbers, or extra context
      placeholder: "RFC 1234, official docs link, etc."

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Please verify before submitting
      options:
        - label: I verified this port is not already in the list
          required: true
        - label: I checked the port number is correct (IANA or widely used)
          required: true